<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACIÊNCIA DOS CRAQUES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@500;700&display=swap');

  :root {
    --bg: #060907;
    --bg2: #0a1210;
    --pitch: #0d3320;
    --pitch-line: rgba(255,255,255,0.14);
    --cyan: #4fd8ff;
    --gold: #ffcf40;
    --card-face: #f2ede1;
    --ink: #12140f;
    --hud: #0e1512;
    --quente: #ff8a3d;
    --frio: #4fd8ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at top, var(--bg2) 0%, var(--bg) 70%);
    color: #e9f7ee;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; flex-direction: column; }
  .pitch-wrap { flex: 1 1 auto; min-height: 0; align-items: center; }
  .pitch { max-height: 100%; overflow: auto; }

  .scoreboard {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 14px;
    background: linear-gradient(180deg, #0f1a14, #0a120e);
    border-bottom: 2px solid var(--cyan);
    box-shadow: 0 0 24px rgba(79,216,255,0.15);
    flex-wrap: wrap;
  }

  .brand {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-size: 20px;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(79,216,255,0.6);
    white-space: nowrap;
  }
  .brand span { color: var(--gold); }

  .stats { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; }
  .stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(79,216,255,0.25);
    border-radius: 4px;
    padding: 5px 9px;
    min-width: 62px;
    text-align: center;
  }
  .stat b { display: block; font-family: 'Oswald', sans-serif; font-size: 15px; color: var(--gold); }
  .stat small { color: #8fb3a0; font-size: 9px; letter-spacing: 1px; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font-family: 'Share Tech Mono', monospace;
    background: rgba(79,216,255,0.08);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 7px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all .15s ease;
  }
  button:hover:not(:disabled) { background: var(--cyan); color: var(--ink); box-shadow: 0 0 14px rgba(79,216,255,0.7); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.gold { border-color: var(--gold); color: var(--gold); }
  button.gold:hover:not(:disabled) { background: var(--gold); color: var(--ink); box-shadow: 0 0 14px rgba(255,207,64,0.7); }

  .pitch-wrap { padding: 10px 10px 16px; display: flex; justify-content: center; }

  .pitch {
    position: relative;
    width: 100%;
    max-width: 820px;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 60px, rgba(255,255,255,0.045) 60px 120px), var(--pitch);
    border: 3px solid var(--pitch-line);
    border-radius: 10px;
    padding: 10px 10px 14px;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.5), 0 0 40px rgba(0,0,0,0.4);
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .stock-area { display: flex; gap: 6px; }
  .foundations { display: flex; gap: 6px; }

  .slot {
    width: 46px; aspect-ratio: 5/7;
    border-radius: 5px;
    border: 1px dashed rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    cursor: pointer;
  }

  .stock-pile {
    background: repeating-linear-gradient(135deg, #0a2a19 0 6px, #0d3320 6px 12px);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-weight: 700; color: var(--gold);
  }
  .stock-pile.empty::after { content: '↺'; font-size: 22px; color: var(--cyan); }

  .foundation-slot { border-color: rgba(255,207,64,0.35); }
  .foundation-slot .badge-empty { font-size: 20px; opacity: 0.35; }

  .tableau {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    position: relative;
  }

  .column { min-height: 80px; border-radius: 5px; padding: 1px; position: relative; }

  .card {
    width: 100%;
    aspect-ratio: 5/7;
    border-radius: 5px;
    margin-top: -112%;
    position: relative;
    user-select: none;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .card:first-child, .column .card:first-child { margin-top: 0; }
  .waste-card, .stock-pile { margin-top: 0; }

  .card .face {
    position: absolute; inset: 0;
    border-radius: 5px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 3px 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }

  .card.up .face { background: var(--card-face); color: var(--ink); border: 1px solid rgba(0,0,0,0.15); }
  .card.down .face { background: repeating-linear-gradient(135deg, #0a2a19 0 6px, #0d3320 6px 12px); border: 1px solid rgba(255,255,255,0.08); }

  .card.up { touch-action: none; }
  .card.selected { transform: translateY(-10px); box-shadow: 0 0 0 3px var(--gold), 0 6px 16px rgba(0,0,0,0.6); z-index: 5; }
  .card.up:hover { transform: translateY(-4px); }
  .card.dragging-source { opacity: 0.25; }

  @keyframes shakeX {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(4px); }
  }
  .invalid-shake {
    animation: shakeX 0.35s ease;
    box-shadow: 0 0 0 3px var(--danger) !important;
  }

  .ghost-card {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    border-radius: 5px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.6);
  }

  .card-top { display: flex; align-items: center; justify-content: space-between; }
  .card-rank { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: clamp(9px, 1.3vw, 13px); }
  .card-badge { font-size: 9px; }
  .card-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: clamp(6.5px, 1vw, 8.5px);
    line-height: 1.02;
    text-align: center;
    padding: 0 1px;
    overflow: hidden;
  }
  .card-team {
    font-size: 6px;
    letter-spacing: 0.3px;
    text-align: center;
    opacity: 0.75;
    font-weight: 700;
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center;
    z-index: 50; backdrop-filter: blur(2px);
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--hud); border: 2px solid var(--cyan); border-radius: 10px;
    padding: 26px 30px; max-width: 400px; text-align: center;
    box-shadow: 0 0 40px rgba(79,216,255,0.3);
  }
  .modal h2 { font-family: 'Oswald', sans-serif; color: var(--gold); letter-spacing: 1px; margin-top: 0; }
  .modal p { color: #9fc2b0; font-size: 13px; }
  .legend { display: flex; justify-content: center; gap: 16px; margin: 16px 0; font-size: 12px; }
  .legend div { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--hud); border: 1px solid var(--cyan); color: var(--cyan);
    padding: 10px 18px; border-radius: 6px; font-size: 13px;
    opacity: 0; transition: all .25s ease; z-index: 60; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 760px) {
    .tableau { gap: 4px; }
    .card { margin-top: -112%; }
    .slot { width: 50px; }
    .brand { font-size: 15px; }
    .card-name { font-size: 8px; }
  }
</style>
</head>
<body>

  <div class="scoreboard">
    <div class="brand">PACIÊNCIA DOS <span>CRAQUES</span></div>
    <div class="stats">
      <div class="stat"><b id="statTime">00:00</b><small>TEMPO</small></div>
      <div class="stat"><b id="statMoves">0</b><small>LANCES</small></div>
      <div class="stat"><b id="statScore">0/52</b><small>ELENCO</small></div>
    </div>
    <div class="controls">
      <button id="btnUndo" class="gold">↺ Voltar</button>
      <button id="btnHint">Dica</button>
      <button id="btnNew">Nova Partida</button>
    </div>
  </div>

  <div class="pitch-wrap">
    <div class="pitch">
      <div class="top-row">
        <div class="stock-area">
          <div class="slot stock-pile" id="stockPile"></div>
          <div class="slot" id="wasteSlot"></div>
        </div>
        <div class="foundations" id="foundations"></div>
      </div>
      <div class="tableau" id="tableau"></div>
    </div>
  </div>

  <div class="overlay show" id="startOverlay">
    <div class="modal">
      <h2>Paciência dos Craques</h2>
      <p>Clube e Seleção misturados em 4 naipes. Monte as sequências alternando os dois grupos até subir o elenco completo pra fundação.</p>
      <div class="legend">
        <div><span style="font-size:20px">🔴⚫</span><small>Flamengo</small></div>
        <div><span style="font-size:20px">🟡🟢</span><small>Seleção BRA</small></div>
        <div><span style="font-size:20px">🔵🔴</span><small>Barcelona</small></div>
        <div><span style="font-size:20px">🔵⚪</span><small>Seleção ARG</small></div>
      </div>
      <button id="btnStart" class="gold" style="padding:12px 20px;font-size:14px;">Apito inicial ⚽</button>
    </div>
  </div>

  <div class="overlay" id="winOverlay">
    <div class="modal">
      <h2>⚽ GOOOL! CAMPEÃO! 🏆</h2>
      <p id="winStats"></p>
      <button id="btnPlayAgain" class="gold" style="padding:12px 20px;font-size:14px;">Jogar de novo</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ===== PACIÊNCIA DOS CRAQUES — motor do jogo (Klondike clássico) ===== */

const SUITS = [
  {
    id: 0, key: 'FLA', name: 'Flamengo', group: 'quente',
    color: '#e0212b', badge: '🔴⚫',
    players: ['Petkovic','Renato Gaúcho','Bebeto','Arrascaeta','Gabigol','Diego','Zinho','Andrade','Adílio','Leandro','Júnior','Gérson','Zico'],
  },
  {
    id: 1, key: 'BRA', name: 'Seleção BRA', group: 'quente',
    color: '#c99a00', badge: '🟡🟢',
    players: ['Falcão','Taffarel','Rivaldo','Neymar','Kaká','Roberto Carlos','Cafu','Sócrates','Romário','Ronaldinho','Ronaldo N.','Garrincha','Pelé'],
  },
  {
    id: 2, key: 'BAR', name: 'Barcelona', group: 'frio',
    color: '#3f7bd6', badge: '🔵🔴',
    players: ['Koeman','Ter Stegen','Deco','Eto\'o','Stoichkov','Busquets','Guardiola','Piqué','Puyol','Iniesta','Xavi','Cruyff','Messi'],
  },
  {
    id: 3, key: 'ARG', name: 'Seleção ARG', group: 'frio',
    color: '#2f9fce', badge: '🔵⚪',
    players: ['Messi','Agüero','Di María','Dybala','Aimar','Passarella','Redondo','Simeone','Zanetti','Riquelme','Batistuta','Kempes','Maradona'],
  },
];

let state = null;
let history = [];
let selected = null;
let timerHandle = null;
let audioCtx = null;

function beep(freq, dur, delay, type = 'sine', vol = 0.15) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t0 = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur);
  } catch (e) {}
}
function goalSound() { beep(523,0.12,0); beep(659,0.12,0.1); beep(784,0.2,0.2); }
function moveSound() { beep(300,0.05,0,'triangle',0.06); }
function winSound() { [523,659,784,1046].forEach((f,i)=>beep(f,0.25,i*0.15,'sine',0.12)); }
function flipSound() { beep(880,0.045,0,'triangle',0.05); }
function errorSound() { beep(180,0.16,0,'sawtooth',0.09); beep(140,0.18,0.05,'sawtooth',0.07); }

function buildDeck() {
  const deck = [];
  let uid = 0;
  for (const suit of SUITS) {
    for (let i = 0; i < 13; i++) {
      const rank = i + 1; // players[0] = Ace, players[12] = King
      deck.push({ id: uid++, rank, suit: suit.id, name: suit.players[i], faceUp: false });
    }
  }
  return deck;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function newGame() {
  const deck = shuffle(buildDeck());
  const tableau = Array.from({ length: 7 }, () => []);
  let idx = 0;
  for (let col = 0; col < 7; col++) {
    for (let k = 0; k <= col; k++) {
      const card = deck[idx++];
      card.faceUp = (k === col);
      tableau[col].push(card);
    }
  }
  const stock = deck.slice(idx);
  state = { tableau, stock, waste: [], foundations: [0,0,0,0], moves: 0, seconds: 0, won: false };
  history = [];
  selected = null;
  startTimer();
  return state;
}

function cloneState() { return JSON.parse(JSON.stringify(state)); }
function pushHistory() { history.push(cloneState()); if (history.length > 300) history.shift(); }
function undo() {
  if (history.length === 0) return false;
  state = history.pop();
  selected = null;
  return true;
}

function startTimer() {
  if (timerHandle) clearInterval(timerHandle);
  timerHandle = setInterval(() => { if (state && !state.won) { state.seconds++; renderStats(); } }, 1000);
}

function isRed(suitId) { return SUITS[suitId].group === 'quente'; }

function isSequenceValid(col, startIndex) {
  const pile = state.tableau[col];
  for (let i = startIndex; i < pile.length - 1; i++) {
    const a = pile[i], b = pile[i+1];
    if (!(a.faceUp && b.faceUp)) return false;
    if (a.rank !== b.rank + 1) return false;
    if (isRed(a.suit) === isRed(b.suit)) return false;
  }
  return true;
}

function canSelectTableau(col, index) {
  const pile = state.tableau[col];
  const card = pile[index];
  if (!card || !card.faceUp) return false;
  return isSequenceValid(col, index);
}

function canDropOnTableau(destCol, movingCards) {
  const pile = state.tableau[destCol];
  const movingTop = movingCards[0];
  if (pile.length === 0) return movingTop.rank === 13;
  const top = pile[pile.length - 1];
  if (!top.faceUp) return false;
  if (top.rank !== movingTop.rank + 1) return false;
  if (isRed(top.suit) === isRed(movingTop.suit)) return false;
  return true;
}

function canDropOnFoundation(suitId, card) {
  if (card.suit !== suitId) return false;
  return state.foundations[suitId] === card.rank - 1;
}

function drawFromStock() {
  pushHistory();
  if (state.stock.length === 0) {
    if (state.waste.length === 0) { history.pop(); return false; }
    state.stock = state.waste.reverse().map(c => ({ ...c, faceUp: false }));
    state.waste = [];
    return true;
  }
  const card = state.stock.pop();
  card.faceUp = true;
  state.waste.push(card);
  state.moves++;
  moveSound();
  return true;
}

function getSelectedCards() {
  if (!selected) return [];
  if (selected.source === 'waste') return [state.waste[state.waste.length - 1]];
  return state.tableau[selected.col].slice(selected.index);
}

function removeSelectedFromSource() {
  if (selected.source === 'waste') { state.waste.pop(); return; }
  const col = selected.col;
  state.tableau[col] = state.tableau[col].slice(0, selected.index);
  if (state.tableau[col].length > 0) {
    const topCard = state.tableau[col][state.tableau[col].length - 1];
    if (!topCard.faceUp) { topCard.faceUp = true; flipSound(); }
  }
}

function clearSelection() { selected = null; }

function moveToTableau(destCol) {
  if (!selected) return false;
  const cards = getSelectedCards();
  if (selected.source === 'tableau' && selected.col === destCol) { clearSelection(); return false; }
  if (!canDropOnTableau(destCol, cards)) return false;
  pushHistory();
  removeSelectedFromSource();
  state.tableau[destCol] = state.tableau[destCol].concat(cards);
  state.moves++;
  moveSound();
  clearSelection();
  checkWin();
  return true;
}

function moveToFoundation(suitId) {
  if (!selected) return false;
  const cards = getSelectedCards();
  if (cards.length !== 1) return false;
  const card = cards[0];
  if (!canDropOnFoundation(suitId, card)) return false;
  pushHistory();
  removeSelectedFromSource();
  state.foundations[suitId] = card.rank;
  state.moves++;
  goalSound();
  showToast(card.name + ' sobe pro time titular! ⭐');
  clearSelection();
  checkWin();
  return true;
}

function autoToFoundation(source, col) {
  let card;
  if (source === 'waste') {
    if (state.waste.length === 0) return false;
    card = state.waste[state.waste.length - 1];
  } else {
    const pile = state.tableau[col];
    card = pile[pile.length - 1];
    if (!card || !card.faceUp) return false;
  }
  if (!canDropOnFoundation(card.suit, card)) return false;
  pushHistory();
  if (source === 'waste') state.waste.pop();
  else {
    state.tableau[col].pop();
    if (state.tableau[col].length > 0) {
      const topCard = state.tableau[col][state.tableau[col].length - 1];
      if (!topCard.faceUp) { topCard.faceUp = true; flipSound(); }
    }
  }
  state.foundations[card.suit] = card.rank;
  state.moves++;
  goalSound();
  showToast(card.name + ' sobe pro time titular! ⭐');
  checkWin();
  return true;
}

function checkWin() {
  if (state.foundations.every(f => f === 13)) {
    state.won = true;
    if (timerHandle) clearInterval(timerHandle);
    winSound();
    return true;
  }
  return false;
}

function findHint() {
  // any tableau top card or waste top card that could go to a foundation
  if (state.waste.length > 0) {
    const c = state.waste[state.waste.length - 1];
    if (canDropOnFoundation(c.suit, c)) return 'Jogue ' + c.name + ' (monte) pra fundação!';
  }
  for (let col = 0; col < 7; col++) {
    const pile = state.tableau[col];
    if (pile.length === 0) continue;
    const c = pile[pile.length - 1];
    if (c.faceUp && canDropOnFoundation(c.suit, c)) return 'Jogue ' + c.name + ' (coluna ' + (col+1) + ') pra fundação!';
  }
  // any tableau sequence that fits elsewhere
  for (let col = 0; col < 7; col++) {
    const pile = state.tableau[col];
    for (let i = 0; i < pile.length; i++) {
      if (!pile[i].faceUp || !isSequenceValid(col, i)) continue;
      const cards = pile.slice(i);
      for (let dest = 0; dest < 7; dest++) {
        if (dest === col) continue;
        if (canDropOnTableau(dest, cards)) return 'Mova ' + cards[0].name + ' da coluna ' + (col+1) + ' pra coluna ' + (dest+1) + '!';
      }
    }
  }
  if (state.stock.length > 0) return 'Compre uma carta do monte.';
  return 'Sem lances óbvios — tenta desfazer ou recomeçar!';
}

/* ===== Arrastar e soltar (mouse + touch) ===== */

let dragState = null;
let suppressClick = false;

function beginDrag(e, source, col, index, originEls) {
  if (state.won) return;
  e.preventDefault();
  const cards = source === 'waste'
    ? [state.waste[state.waste.length - 1]]
    : state.tableau[col].slice(index);

  const colRefEl = document.querySelector('.column');
  const colWidth = colRefEl ? colRefEl.offsetWidth : 90;

  dragState = {
    source, col, index, cards,
    startX: e.clientX, startY: e.clientY,
    moved: false, originEls, colWidth,
  };

  originEls.forEach(el => el.classList.add('dragging-source'));

  const wrap = document.createElement('div');
  wrap.id = 'dragGhostWrap';
  cards.forEach((card, i) => {
    const g = document.createElement('div');
    g.className = 'card up ghost-card';
    g.style.width = colWidth + 'px';
    g.style.left = (e.clientX - colWidth / 2) + 'px';
    g.style.top = (e.clientY - (colWidth * 1.4) / 2 + i * (colWidth * 0.28)) + 'px';
    g.innerHTML = cardFaceHTML(card);
    wrap.appendChild(g);
  });
  document.body.appendChild(wrap);
  dragState.ghostEl = wrap;

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if (Math.abs(dx) > 6 || Math.abs(dy) > 6) dragState.moved = true;

  const w = dragState.colWidth;
  Array.from(dragState.ghostEl.children).forEach((g, i) => {
    g.style.left = (e.clientX - w / 2) + 'px';
    g.style.top = (e.clientY - (w * 1.4) / 2 + i * (w * 0.28)) + 'px';
  });

  document.querySelectorAll('.column.drop-hint').forEach(c => c.classList.remove('drop-hint'));
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const colEl = el ? el.closest('.column') : null;
  if (colEl) colEl.classList.add('drop-hint');
}

function endDragVisuals() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);
  document.querySelectorAll('.column.drop-hint').forEach(c => c.classList.remove('drop-hint'));
  if (dragState && dragState.ghostEl) dragState.ghostEl.remove();
  if (dragState) dragState.originEls.forEach(el => el.classList.remove('dragging-source'));
}

function onDragEnd(e) {
  if (!dragState) { endDragVisuals(); return; }
  const wasMoved = dragState.moved;
  const { source, col, index } = dragState;
  const dropX = e.clientX, dropY = e.clientY;
  endDragVisuals();
  dragState = null;

  if (!wasMoved) return; // treat as a plain click; let the native click event handle selection

  suppressClick = true;
  selected = { source, col, index };

  const el = document.elementFromPoint(dropX, dropY);
  const destFoundEl = el ? el.closest('.foundation-slot') : null;
  const destColEl = el ? el.closest('.column') : null;

  if (destFoundEl) {
    const suitId = parseInt(destFoundEl.dataset.suit, 10);
    const ok = moveToFoundation(suitId);
    if (!ok) flashInvalid(destFoundEl, 'Essa carta não é a próxima da fundação!');
  } else if (destColEl) {
    const destCol = parseInt(destColEl.dataset.col, 10);
    const ok = moveToTableau(destCol);
    if (!ok) flashInvalid(destColEl, 'Não dá pra encaixar essa jogada!');
  } else {
    clearSelection();
  }
  render();
}

/* ===== UI ===== */

const tableauEl = document.getElementById('tableau');
const stockPileEl = document.getElementById('stockPile');
const wasteSlotEl = document.getElementById('wasteSlot');
const foundationsEl = document.getElementById('foundations');
const toastEl = document.getElementById('toast');
let toastTimeout = null;

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

function flashInvalid(el, msg) {
  errorSound();
  showToast(msg || 'Jogada inválida!');
  if (!el) return;
  el.classList.remove('invalid-shake');
  // force reflow so the animation can retrigger if fired again quickly
  void el.offsetWidth;
  el.classList.add('invalid-shake');
  setTimeout(() => el.classList.remove('invalid-shake'), 380);
}

function fmtTime(s) {
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return m + ':' + sec;
}

function renderStats() {
  document.getElementById('statTime').textContent = fmtTime(state.seconds);
  document.getElementById('statMoves').textContent = state.moves;
  const placed = state.foundations.reduce((a,f)=>a+f,0);
  document.getElementById('statScore').textContent = placed + '/52';
  document.getElementById('btnUndo').disabled = history.length === 0;
}

function cardFaceHTML(card) {
  const suit = SUITS[card.suit];
  return (
    '<div class="face" style="border-left:4px solid ' + suit.color + '">' +
      '<div class="card-top">' +
        '<div class="card-rank" style="color:' + suit.color + '">' + card.rank + '</div>' +
        '<div class="card-badge">' + suit.badge + '</div>' +
      '</div>' +
      '<div class="card-name">' + card.name + '</div>' +
      '<div class="card-team" style="color:' + suit.color + '">' + suit.name.toUpperCase() + '</div>' +
    '</div>'
  );
}

function render() {
  // tableau
  tableauEl.innerHTML = '';
  state.tableau.forEach((pile, colIdx) => {
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.col = colIdx;
    pile.forEach((card, cardIdx) => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card ' + (card.faceUp ? 'up' : 'down');
      if (selected && selected.source === 'tableau' && selected.col === colIdx && cardIdx >= selected.index) {
        cardEl.classList.add('selected');
      }
      cardEl.innerHTML = card.faceUp ? cardFaceHTML(card) : '<div class="face"></div>';
      cardEl.addEventListener('click', (e) => { e.stopPropagation(); onTableauCardClick(colIdx, cardIdx, cardEl); });
      cardEl.addEventListener('dblclick', (e) => { e.stopPropagation(); onTableauCardDblClick(colIdx, cardIdx, cardEl); });
      cardEl.addEventListener('pointerdown', (e) => {
        if (!card.faceUp || state.won) return;
        if (!canSelectTableau(colIdx, cardIdx)) return;
        const kids = Array.from(colEl.children).slice(cardIdx);
        beginDrag(e, 'tableau', colIdx, cardIdx, kids);
      });
      colEl.appendChild(cardEl);
    });
    colEl.addEventListener('click', () => onColumnClick(colIdx, colEl));
    tableauEl.appendChild(colEl);
  });

  // stock
  stockPileEl.classList.toggle('empty', state.stock.length === 0);
  stockPileEl.innerHTML = state.stock.length > 0
    ? '<div class="face" style="position:absolute;inset:0;background:repeating-linear-gradient(135deg,#0a2a19 0 6px,#0d3320 6px 12px);border-radius:6px;"></div>'
    : '';

  // waste
  wasteSlotEl.innerHTML = '';
  if (state.waste.length > 0) {
    const card = state.waste[state.waste.length - 1];
    const cardEl = document.createElement('div');
    cardEl.className = 'card up waste-card';
    cardEl.style.width = '100%';
    if (selected && selected.source === 'waste') cardEl.classList.add('selected');
    cardEl.innerHTML = cardFaceHTML(card);
    cardEl.addEventListener('click', (e) => { e.stopPropagation(); onWasteClick(); });
    cardEl.addEventListener('pointerdown', (e) => {
      if (state.won) return;
      beginDrag(e, 'waste', -1, state.waste.length - 1, [cardEl]);
    });
    cardEl.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const ok = autoToFoundation('waste');
      if (!ok) flashInvalid(cardEl, 'Ainda não é a vez dessa carta na fundação.');
      render();
    });
    wasteSlotEl.appendChild(cardEl);
  }

  // foundations
  foundationsEl.innerHTML = '';
  SUITS.forEach(suit => {
    const slot = document.createElement('div');
    slot.className = 'slot foundation-slot';
    slot.dataset.suit = suit.id;
    const rank = state.foundations[suit.id];
    if (rank === 0) {
      slot.innerHTML = '<span class="badge-empty">' + suit.badge + '</span>';
    } else {
      const card = { rank, suit: suit.id, name: suit.players[rank-1] };
      slot.innerHTML = cardFaceHTML(card);
    }
    slot.addEventListener('click', () => onFoundationClick(suit.id, slot));
    foundationsEl.appendChild(slot);
  });

  renderStats();

  if (state.won) {
    document.getElementById('winStats').textContent = fmtTime(state.seconds) + ' • ' + state.moves + ' lances';
    document.getElementById('winOverlay').classList.add('show');
  }
}

function onTableauCardClick(col, index, el) {
  if (suppressClick) { suppressClick = false; return; }
  if (state.won) return;
  const pile = state.tableau[col];
  const card = pile[index];
  if (!card.faceUp) return;

  if (selected && selected.source === 'tableau' && selected.col === col && selected.index === index) {
    clearSelection(); render(); return;
  }

  if (selected) {
    const movedTab = moveToTableau(col);
    if (!movedTab) {
      if (canSelectTableau(col, index)) {
        selected = { source: 'tableau', col, index };
      } else {
        flashInvalid(el, 'Não dá pra encaixar essa jogada!');
        clearSelection();
      }
    }
    render();
    return;
  }

  if (canSelectTableau(col, index)) selected = { source: 'tableau', col, index };
  render();
}

function onTableauCardDblClick(col, index, el) {
  if (state.won) return;
  const pile = state.tableau[col];
  if (index !== pile.length - 1) return;
  clearSelection();
  const ok = autoToFoundation('tableau', col);
  if (!ok) flashInvalid(el, 'Ainda não é a vez dessa carta na fundação.');
  render();
}

function onColumnClick(col, el) {
  if (suppressClick) { suppressClick = false; return; }
  if (state.won || !selected) return;
  const ok = moveToTableau(col);
  if (!ok) flashInvalid(el, 'Só um Rei pode ir numa coluna vazia!');
  render();
}

function onWasteClick() {
  if (suppressClick) { suppressClick = false; return; }
  if (state.won) return;
  if (selected && selected.source === 'waste') { clearSelection(); render(); return; }
  if (selected) { clearSelection(); }
  if (state.waste.length > 0) selected = { source: 'waste', col: -1, index: state.waste.length - 1 };
  render();
}

function onFoundationClick(suitId, el) {
  if (suppressClick) { suppressClick = false; return; }
  if (state.won) return;
  if (selected) {
    const ok = moveToFoundation(suitId);
    if (!ok) flashInvalid(el, 'Essa carta não é a próxima da fundação!');
    render();
  }
}

stockPileEl.addEventListener('click', () => { if (!state.won) { drawFromStock(); render(); } });

document.getElementById('btnUndo').addEventListener('click', () => { undo(); render(); });
document.getElementById('btnHint').addEventListener('click', () => { showToast(findHint()); });
document.getElementById('btnNew').addEventListener('click', () => {
  document.getElementById('winOverlay').classList.remove('show');
  newGame();
  render();
});
document.getElementById('btnStart').addEventListener('click', () => {
  document.getElementById('startOverlay').classList.remove('show');
  newGame();
  render();
});
document.getElementById('btnPlayAgain').addEventListener('click', () => {
  document.getElementById('winOverlay').classList.remove('show');
  newGame();
  render();
});
</script>
</body>
</html>
